<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AssetCloud Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
	<title>Dashboard</title>
	<link rel="icon" href="./images/logo.png" type="image/x-icon" />
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --background: #f8fafc;
            --text: #0f172a;
            --cloud-color: #e0e7ff;
            --asset-color: #a5b4fc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--background);
            position: relative;
            overflow: hidden;
        }

        /* Floating assets in the background */
        .floating-asset {
            position: absolute;
            width: 60px; /* Adjust the width as needed */
            height: 60px; /* Adjust the height as needed */
            background: var(--asset-color);
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.1);
            animation: float 6s infinite ease-in-out;
            display: flex; /* Use flexbox to center the image */
            align-items: center; /* Center vertically */
            justify-content: center; /* Center horizontally */
        }

        .floating-asset:nth-child(1) {
            top: 10%;
            left: 5%;
            animation-duration: 8s;
        }

        .floating-asset:nth-child(2) {
            top: 30%;
            left: 80%;
            animation-duration: 10s;
        }

        .floating-asset:nth-child(3) {
            top: 70%;
            left: 20%;
            animation-duration: 7s;
        }

        .floating-asset:nth-child(4) {
            top: 50%;
            left: 60%;
            animation-duration: 9s;
        }
        
        .floating-asset img {
        width: 100%; /* Make the image take the full width of the container */
        height: 100%; /* Make the image take the full height of the container */
        object-fit: contain; /* Maintain aspect ratio */
            }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        /* Login container */
        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 400px;
            z-index: 1;
            transform: translateY(0);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .login-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        }

        /* Logo and branding */
        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo h1 {
            font-size: 2.5rem;
            color: var(--text);
            letter-spacing: -0.05em;
            background: linear-gradient(45deg, var(--primary), #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo p {
            color: #64748b;
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        /* Form styling */
        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 0.75rem;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #fff;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #94a3b8;
            transition: color 0.3s ease;
        }

        .password-toggle:hover {
            color: var(--primary);
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(45deg, var(--primary), #8b5cf6);
            color: white;
            border: none;
            border-radius: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            background: linear-gradient(45deg, #4f46e5, #7c3aed);
            transform: translateY(-2px);
			margin-top: 10px;
        }

        .forgot-password {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: #64748b;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .forgot-password:hover {
            color: var(--primary);
        }

        /* Modal styling */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            width: 90%;
            max-width: 400px;
            transform: scale(0.9);
            opacity: 0;
            animation: modalOpen 0.3s forwards;
        }

        @keyframes modalOpen {
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Loading animation */
        .loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s infinite linear;
            right: 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
   

<!-- Floating assets in the background -->
    <div class="floating-asset"><img src="images/cloud.svg" alt=""></div>
    <div class="floating-asset"><img src="images/folder.svg" alt=""></div>
    <div class="floating-asset"><img src="images/cloud.svg" alt=""></div>
    <div class="floating-asset"><img src="images/folder.svg" alt=""></div>

    <!-- Login container -->
    <div class="login-container">
        <div class="logo">
            <h1>AssetCloud</h1>
            <p>Your assets, everywhere.</p>
        </div>

        <form id="loginForm" method="post"
                            role="form"
                            th:action="@{/login}" >
            <div class="form-group">
                <input type="text" name="username" class="form-input" placeholder="Username" required>
            </div>

            <div class="form-group">
                <input type="password" name="password" class="form-input" placeholder="Password" required>
                <span class="password-toggle">👁️</span>
            </div>

            <button type="submit" class="submit-btn" onclick="window.location.href='/welcome';"> Sign In</button> 
            <a href="#" class="forgot-password" id="forgotPassword">Forgot Password?</a>
        </form>
    </div>

    <!-- Modal for forgot password -->
    <div class="modal" id="passwordModal">
        <div class="modal-content">
            <h2>Reset Password</h2>
            <form id="resetForm" style="margin-top: 1.5rem;">
                <div class="form-group">
                    <input type="email" class="form-input" placeholder="Enter your email" required>
                </div>
                <button type="submit" class="submit-btn">Send Reset Link</button>
            </form>
			<button type="" class="submit-btn" onclick="window.location.href='login.html';">Back to Login</button>
        </div>
    </div>





</body>
</html>
